# Optional: Add local LLM support via Ollama
# Usage: docker compose -f docker-compose.yml -f docker-compose.ollama.yml up -d
#
# After starting, pull a model:
#   docker compose exec ollama ollama pull llama3

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama_data:
